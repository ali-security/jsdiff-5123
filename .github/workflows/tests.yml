# 1) CONTRIBUTING.md "Building": npm install && npm test
#    npm test -> grunt default = clean, build, cover (Node + Istanbul; no Karma).
# 2) Same "test" sub-chain as grunt release (Gruntfile: release -> ... -> test):
#    grunt test = build, mochaTest, karma:unit (browser tests).
# NODE_OPTIONS avoids OpenSSL/webpack errors on Node 17+ during Karma.
name: Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests (CONTRIBUTING — default grunt: clean, build, cover)
        run: npm test

      - name: Set up Chrome (Karma HeadlessChrome)
        uses: browser-actions/setup-chrome@v1

      - name: CHROME_BIN for karma-chrome-launcher
        run: echo "CHROME_BIN=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser)" >> "$GITHUB_ENV"

      - name: Browser + full test task (same as in grunt release, without uglify/publish)
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npx grunt test
